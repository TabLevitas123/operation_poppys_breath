name: Diagnose GitHub Actions runner

on:
  push:
    branches:
      - agent/ocsa-infrastructure-hardening-20260723
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Confirm runner startup
        run: |
          set -Eeuo pipefail
          echo "runner=${RUNNER_OS}"
          echo "commit=${GITHUB_SHA}"
          python3 --version
