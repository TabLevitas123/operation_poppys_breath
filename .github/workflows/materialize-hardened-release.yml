name: Materialize hardened OCSA source

on:
  push:
    branches:
      - agent/ocsa-infrastructure-hardening-20260723

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out authenticated source bundle
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/ocsa-infrastructure-hardening-20260723

      - name: Verify, extract, and commit source tree
        shell: bash
        run: |
          set -Eeuo pipefail

          cd .bootstrap/hardened-source
          sha256sum --check SHA256SUMS
          cat part-*.b64 > /tmp/ocsa-source.tar.gz.b64
          echo 'ad8b321dc2c7cfabbc9d9c6710061f10289603686fdbec2785809e39e82e0473  /tmp/ocsa-source.tar.gz.b64' | sha256sum --check -
          base64 --decode /tmp/ocsa-source.tar.gz.b64 > /tmp/ocsa-source.tar.gz
          echo '8bcc3a3b3c3e52dda85a77b1bb8aa0a088ba7ce75c0bf44f278f46df9d9e2192  /tmp/ocsa-source.tar.gz' | sha256sum --check -
          cd ../..

          python - <<'PY'
          import pathlib
          import tarfile

          archive = pathlib.Path('/tmp/ocsa-source.tar.gz')
          with tarfile.open(archive, 'r:gz') as handle:
              for member in handle.getmembers():
                  path = pathlib.PurePosixPath(member.name)
                  if path.is_absolute() or '..' in path.parts:
                      raise SystemExit(f'unsafe archive path: {member.name}')
                  if member.issym() or member.islnk():
                      raise SystemExit(f'archive link rejected: {member.name}')
          PY

          tar -xzf /tmp/ocsa-source.tar.gz -C .
          test -f schema.sql
          test -f src/ocsa_store.py
          test -f tests/test_store.py
          test -f scripts/build_infrastructure_release.py
          test -f RESEARCH_PROTOCOL.md

          rm -rf .bootstrap/hardened-source
          rm -f .github/workflows/bootstrap-audit.yml
          rm -f .github/workflows/materialize-hardened-release.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Materialize hardened OCSA infrastructure source'
          git push origin HEAD:agent/ocsa-infrastructure-hardening-20260723
